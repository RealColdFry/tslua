name: Nightly

permissions:
  contents: write
  id-token: write

on:
  workflow_dispatch:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      sha_short: ${{ steps.check.outputs.sha_short }}
      sha: ${{ steps.check.outputs.sha }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for new commits and compute version
        id: check
        run: |
          SHA=$(git rev-parse HEAD)
          SHA_SHORT=$(git rev-parse --short=8 HEAD)
          COMMIT_COUNT=$(git rev-list --count HEAD)

          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"

          BASE=$(grep -oP 'version\s*=\s*"\K[^-]+' cmd/tslua/main.go)
          VERSION="${BASE}-dev.${COMMIT_COUNT}"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Skip if this commit already has a dev tag
          EXISTING=$(git tag --points-at HEAD | grep "^v${BASE}-dev\\." || true)
          if [ -n "$EXISTING" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Dev release already exists for HEAD ($SHA_SHORT): $EXISTING"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Will release $VERSION"
          fi

  ci:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI passed for commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ needs.check.outputs.sha }}"
          for check in build-and-test lint; do
            CONCLUSION=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" \
              --jq "[.check_runs[] | select(.name == \"$check\")] | last | .conclusion // empty")
            if [ "$CONCLUSION" != "success" ]; then
              echo "::error::Check '$check' not passing for $SHA (conclusion: ${CONCLUSION:-not found})"
              exit 1
            fi
            echo "✓ $check passed"
          done

  build:
    needs: [check, ci]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Init submodules
        run: |
          git submodule update --init --depth 1 extern/typescript-go

      - name: Apply tsgo patches
        run: ./scripts/apply-tsgo-patches.sh

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        shell: bash
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          COMMIT="${{ needs.check.outputs.sha_short }}"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION} -X main.gitCommit=${COMMIT}" \
            -o "tslua-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" ./cmd/tslua/

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tslua-${{ matrix.goos }}-${{ matrix.goarch }}
          path: tslua-*

  release:
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare archives
        run: |
          mkdir -p release
          cd artifacts
          for bin in tslua-*; do
            chmod +x "$bin" 2>/dev/null || true
            ARCHIVE_NAME="${bin%.exe}"
            if [[ "$bin" == *.exe ]]; then
              cp "$bin" tslua.exe
              zip "../release/${ARCHIVE_NAME}.zip" tslua.exe
              rm tslua.exe
            else
              tar czf "../release/${bin}.tar.gz" --transform 's|'"$bin"'|tslua|' "$bin"
            fi
          done
          ls -lh ../release/

      - name: Delete previous dev releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName --jq '.[].tagName' | grep -- '-dev\.' | while read -r tag; do
            echo "Deleting release $tag"
            gh release delete "$tag" --yes --cleanup-tag || true
          done

      - name: Create dev release (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check.outputs.tag }}"
          VERSION="${{ needs.check.outputs.version }}"
          SHA_SHORT="${{ needs.check.outputs.sha_short }}"
          SHA="${{ needs.check.outputs.sha }}"
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.run_id }}"

          gh release create "$TAG" release/* \
            --target main \
            --title "tslua ${VERSION}" \
            --prerelease \
            --draft \
            --notes "Development build from [\`${SHA_SHORT}\`](https://github.com/${REPO}/commit/${SHA}) · [CI run](https://github.com/${REPO}/actions/runs/${RUN_ID})

          > [!WARNING]
          > Dev builds are automated snapshots. Use at your own risk.

          ### Install

          \`\`\`bash
          # macOS (Apple Silicon)
          curl -fsSL https://github.com/${REPO}/releases/download/${TAG}/tslua-darwin-arm64.tar.gz | tar xz

          # Linux (x86_64)
          curl -fsSL https://github.com/${REPO}/releases/download/${TAG}/tslua-linux-amd64.tar.gz | tar xz
          \`\`\`"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 3
          gh release edit "${{ needs.check.outputs.tag }}" --draft=false

  npm:
    needs: [check, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate npm packages
        env:
          TSLUA_VERSION: ${{ needs.check.outputs.version }}
        run: node scripts/gen-npm-packages.mjs

      - name: Publish
        run: |
          for package in ./npm/cli-*/; do
            echo "Publishing $(jq -r .name "$package/package.json")@${{ needs.check.outputs.version }}"
            npm publish "$package" --provenance
          done
          # Wait for platform packages to be available on registry
          VERSION="${{ needs.check.outputs.version }}"
          for dep in darwin-arm64 darwin-x64 linux-arm64 linux-x64 win32-x64; do
            until npm view "@tslua/cli-${dep}@${VERSION}" version >/dev/null 2>&1; do
              echo "Waiting for @tslua/cli-${dep}@${VERSION}..."
              sleep 5
            done
          done
          echo "Publishing @tslua/cli@${VERSION}"
          npm publish ./npm/tslua --provenance
