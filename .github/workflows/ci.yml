name: CI

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Init submodules
        run: |
          git submodule update --init --depth 1 extern/tsgolint
          git -C extern/tsgolint submodule update --init --depth 1 typescript-go
          git submodule update --init --depth 1 extern/tstl

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Install tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install gotest.tools/gotestsum@latest

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Lua runtimes
        id: lua-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .lua-runtimes
          key: lua-runtimes-${{ runner.os }}-${{ hashFiles('scripts/lua-versions.txt', 'scripts/build-lua.sh') }}

      - name: Install Lua build dependencies
        if: steps.lua-cache.outputs.cache-hit != 'true'
        run: sudo apt-get install -y libreadline-dev

      - name: Build Lua runtimes
        run: ./scripts/build-lua.sh

      - name: Build tslua
        run: go build -o tslua ./cmd/tslua/

      - name: Check formatting
        run: |
          goimports -l cmd/ internal/ | grep . && exit 1 || true
          npx oxfmt --check scripts/ website/

      - name: Tests
        run: |
          export PATH="$PWD/.lua-runtimes/bin:$PATH"
          FORCE_COLOR=1 gotestsum --format short ./internal/transpiler/ ./internal/lua/... ./internal/tstltest/ -skip TestCodegen_

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Init submodules
        run: |
          git submodule update --init --depth 1 extern/tsgolint
          git -C extern/tsgolint submodule update --init --depth 1 typescript-go
          git submodule update --init --depth 1 extern/tstl

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Install npm dependencies
        run: npm ci

      - name: Build TSTL
        run: |
          ./scripts/apply-tstl-patches.sh
          cd extern/tstl && npm ci && npm run build

      - name: Check lualib freshness
        run: |
          ./scripts/update-lualib.sh
          git diff --exit-code internal/lualib/ || {
            echo "::error::Committed lualib files are stale. Run 'just update-lualib' and commit the result."
            exit 1
          }

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.11.4

      - name: typecheck
        run: npm run typecheck

      - name: oxlint
        run: npx oxlint scripts/ website/
