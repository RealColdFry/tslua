name: Deploy website to GitHub Pages

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "cmd/wasm/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Init submodules
        run: |
          git submodule update --init --depth 1 extern/typescript-go

      - name: Apply tsgo patches
        run: ./scripts/apply-tsgo-patches.sh

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Cache Go build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ hashFiles('go.sum') }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Build WASM
        run: |
          mkdir -p website/src/assets/wasm
          GOOS=js GOARCH=wasm go build -ldflags="-s -w" -o website/src/assets/wasm/tslua.wasm ./cmd/wasm/
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" website/src/assets/wasm/
          cp internal/lualib/middleclass/middleclass.lua website/src/assets/wasm/middleclass.lua

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build
        working-directory: website
        run: npm run build

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
